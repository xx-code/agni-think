name: Build & Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/agni-web/**'
              - 'config/frontend/**'
            api:
              - 'apps/agni_api/**'
              - 'config/api/**'

      - name: Set up Dcocker tags
        id: vars
        run: | 
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Login docker
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }} 
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Release Frontend
        if: steps.filter.outputs.frontend 
        run: | 
          docker build --build-arg BUILD_CONFIGURATION=Release \
          -t ${{ vars.REGISTRY_URL }}/agni-web:${{ steps.vars.outputs.sha_short }} \
          -t ${{ vars.REGISTRY_URL }}/agni-web:${{ steps.vars.outputs.branch }}-latest \
          -f config/frontend/Dockerfile .
          docker push --all-tags ${{ vars.REGISTRY_URL}}/agni-web
      
      - name: Build and Release Api
        if: steps.filter.outputs.api == 'true'
        run: |
          docker build --build-arg BUILD_CONFIGURATION=Release \
          -t ${{vars.REGISTRY_URL}}/agni-api-spring-boot:${{ steps.vars.outputs.sha_short }} \
          -t ${{ vars.REGISTRY_URL }}/agni-api-spring-boot:${{ steps.vars.outputs.branch }}-latest \
          -f config/api/Dockerfile .
          docker push --all-tags ${{ vars.REGISTRY_URL}}/agni-api-spring-boot

      #- name: Build and Release Agent
        # if: steps.filter.outputs.agent == 'true'
