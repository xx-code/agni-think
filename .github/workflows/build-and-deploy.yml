name: Build & Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/agni-web/**'
              - 'config/frontend/**'
            api:
              - 'apps/agni_api/**'
              - 'config/api/**'

      - name: Set up Dcocker tags
        id: vars
        run: | 
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Login docker
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }} 
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Release Frontend
        if: steps.filter.outputs.frontend 
        run: | 
          docker build --build-arg BUILD_CONFIGURATION=Release \
          -t ${{ vars.REGISTRY_URL }}/agni-web:${{ steps.vars.outputs.sha_short }} \
          -t ${{ vars.REGISTRY_URL }}/agni-web:${{ steps.vars.outputs.branch }}-latest \
          -f config/frontend/Dockerfile .
          docker push --all-tags ${{ vars.REGISTRY_URL}}/agni-web
      
      - name: Build and Release Api
        if: steps.filter.outputs.api == 'true'
        run: |
          docker build --build-arg BUILD_CONFIGURATION=Release \
          -t ${{vars.REGISTRY_URL}}/agni-api-spring-boot:${{ steps.vars.outputs.sha_short }} \
          -t ${{ vars.REGISTRY_URL }}/agni-api-spring-boot:${{ steps.vars.outputs.branch }}-latest \
          -f config/api/Dockerfile .
          docker push --all-tags ${{ vars.REGISTRY_URL}}/agni-api-spring-boot

      - name: Hook HomeLab Repository
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true'
        run: | 
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://${{ secrets.HOMELAB_GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/homelab.git homelab-repo
          cd homelab-repo

          cat << EOF > apps/agni/hooks.yml
          version: "1.0"
          last_deployment:
            branch: "${{ steps.vars.outputs.branch }}"
            sha: "${{ steps.vars.outputs.sha_short }}"
            updated_at: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          EOF

          git add apps/agni/hooks.yml
          git commit -m "chore(deploy): trigger webhook/pull for sha-${{ steps.vars.outputs.sha_short }}" || echo "No changes to commit"
          git push origin main
